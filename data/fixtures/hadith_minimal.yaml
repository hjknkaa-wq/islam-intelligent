    chapter_number: 1
    grading: "sahih"
    narrator_start: "عُمَرُ بْنُ الْخَطَّابِ"
    narrator_end: "رَسُولُ اللَّهِ صلى الله عليه وسلم"
    topics:
      - "intention"
      - "migration"
      - "sincerity"

  # Hadith 2: Revelation in the Cave of Hira
  - canonical_id: "hadith:bukhari:sahih:2"
    text_ar: "كَانَ رَسُولُ اللَّهِ صلى الله عليه وسلم يُحِبُّ الْعَزْلَ، وَكَانَ يَتَحَنَّثُ فِي غَارِ حِرَاءٍ فِي الْجَبَلِ... فَجَاءَهُ الْمَلَكُ فَقَالَ اقْرَأْ. قَالَ مَا أَنَا بِقَارِئٍ. قَالَ فَأَخَذَنِي فَغَطَّنِي حَتَّى بَلَغَ مِنِّي الْجَهْدَ، ثُمَّ أَرْسَلَنِي فَقَالَ اقْرَأْ. قُلْتُ مَا أَنَا بِقَارِئٍ..."
    text_en: "The Messenger of Allah used to love seclusion. He would meditate in the Cave of Hira on the mountain... Then the angel came to him and said: Read. He said: I am not one who reads. The angel took me and pressed me until I could not bear it anymore, then he released me and said: Read. I said: I am not one who reads..."
    collection: "bukhari"
    numbering_system: "sahih"
    hadith_number: "2"
