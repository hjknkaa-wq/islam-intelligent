  # Hadith 4: Seeking Knowledge is Obligatory
  - canonical_id: "hadith:bukhari:sahih:4"
    text_ar: "طَلَبُ الْعِلْمِ فَرِيضَةٌ عَلَى كُلِّ مُسْلِمٍ"
    text_en: "Seeking knowledge is obligatory upon every Muslim."
    collection: "bukhari"
    numbering_system: "sahih"
