  # Hadith 5: The Five Pillars of Islam
  - canonical_id: "hadith:bukhari:sahih:5"
    text_ar: "بُنِيَ الإِسْلاَمُ عَلَى خَمْسٍ: شَهَادَةِ أَنْ لاَ إِلَهَ إِلاَّ اللَّهُ وَأَنَّ مُحَمَّدًا رَسُولُ اللَّهِ، وَإِقَامِ الصَّلاَةِ، وَإِيتَاءِ الزَّكَاةِ، وَالْحَجِّ، وَصَوْمِ رَمَضَانَ"
    text_en: "Islam is built upon five: testifying that there is no deity worthy of worship except Allah and that Muhammad is the Messenger of Allah, establishing prayer, giving zakat, making the pilgrimage, and fasting Ramadan."
    collection: "bukhari"
    numbering_system: "sahih"
    hadith_number: "5"
