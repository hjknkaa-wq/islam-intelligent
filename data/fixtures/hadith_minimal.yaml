  # Hadith 3: The First Revelation
  - canonical_id: "hadith:bukhari:sahih:3"
    text_ar: "حَدَّثَنَا يَحْيَى بْنُ بُكَيْرٍ، حَدَّثَنَا اللَّيْثُ، عَنْ عُقَيْلٍ، عَنِ ابْنِ شِهَابٍ، عَنْ عُرْوَةَ، أَنَّ عَائِشَةَ قَالَتْ: أَوَّلُ مَا بَدَأَ بِهِ رَسُولُ اللَّهِ صلى الله عليه وسلم مِنَ الْوَحْيِ الرُّؤْيَا الصَّادِقَةُ فِي النَّوْمِ، فَكَانَ لاَ يَرَى رُؤْيَا إِلاَّ جَاءَتْ مِثْلَ فَلَقِ الصُّبْحِ"
    text_en: "The commencement of the Divine Inspiration to Allah's Messenger was in the form of good dreams which came true like bright daylight..."
