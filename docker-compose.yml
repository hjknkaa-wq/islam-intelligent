services:
  postgres:
    image: islam-intelligent-postgres:15-pgvector
    build:
      context: .
      dockerfile_inline: |
        FROM postgres:15
        RUN apt-get update \
            && apt-get install -y --no-install-recommends postgresql-15-pgvector \
            && rm -rf /var/lib/apt/lists/*
        RUN printf 'CREATE EXTENSION IF NOT EXISTS vector;\n' > /docker-entrypoint-initdb.d/01-enable-pgvector.sql
    container_name: islam-intelligent-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      RAG_ENABLE_LLM: ${RAG_ENABLE_LLM:-false}
      RAG_LLM_MODEL: ${RAG_LLM_MODEL:-gpt-4o-mini}
      RAG_LLM_TEMPERATURE: ${RAG_LLM_TEMPERATURE:-0.2}
      RAG_LLM_SEED: ${RAG_LLM_SEED:-42}
      RAG_LLM_BASE_URL: ${RAG_LLM_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Embedding Configuration
      EMBEDDING_MODEL_PROVIDER: ${EMBEDDING_MODEL_PROVIDER:-sentence-transformers}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-BAAI/bge-base-en-v1.5}
      # Reranker Configuration
      RERANKER_ENABLED: ${RERANKER_ENABLED:-true}
      RERANKER_MODEL: ${RERANKER_MODEL:-cross-encoder/ms-marco-MiniLM-L-6-v2}
      # HyDE Configuration
      HYDE_ENABLED: ${HYDE_ENABLED:-true}
      HYDE_MAX_TOKENS: ${HYDE_MAX_TOKENS:-256}
      # Query Expansion Configuration
      QUERY_EXPANSION_ENABLED: ${QUERY_EXPANSION_ENABLED:-true}
      QUERY_EXPANSION_COUNT: ${QUERY_EXPANSION_COUNT:-3}
      # Budget and Quality Thresholds
      DAILY_BUDGET_USD: ${DAILY_BUDGET_USD:-10.0}
      FAITHFULNESS_THRESHOLD: ${FAITHFULNESS_THRESHOLD:-0.7}
      # Observability
      METRICS_ENABLED: ${METRICS_ENABLED:-false}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://cloud.langfuse.com}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dev

  neo4j:
    image: neo4j:5.26-community
    container_name: islam-intelligent-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/change-me}
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - dev

  api:
    build:
      context: ./apps/api
      dockerfile_inline: |
        FROM python:3.12-slim
        ENV PYTHONDONTWRITEBYTECODE=1
        ENV PYTHONUNBUFFERED=1
        WORKDIR /app
        COPY . .
        RUN pip install --no-cache-dir --upgrade pip \
            && pip install --no-cache-dir -e . "uvicorn[standard]"
    container_name: islam-intelligent-api
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: ${DATABASE_URL}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # RAG and LLM Configuration
      RAG_ENABLE_LLM: ${RAG_ENABLE_LLM:-false}
      RAG_LLM_MODEL: ${RAG_LLM_MODEL:-gpt-4o-mini}
      RAG_LLM_TEMPERATURE: ${RAG_LLM_TEMPERATURE:-0.2}
      RAG_LLM_SEED: ${RAG_LLM_SEED:-42}
      RAG_LLM_BASE_URL: ${RAG_LLM_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Embedding Configuration
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1536}
      EMBEDDING_MODEL_PROVIDER: ${EMBEDDING_MODEL_PROVIDER:-sentence-transformers}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-BAAI/bge-base-en-v1.5}
      # Reranker Configuration
      RAG_ENABLE_RERANKER: ${RAG_ENABLE_RERANKER:-true}
      RAG_RERANKER_MODEL: ${RAG_RERANKER_MODEL:-cross-encoder/ms-marco-MiniLM-L-6-v2}
      RAG_RERANKER_TOP_K: ${RAG_RERANKER_TOP_K:-10}
      RERANKER_ENABLED: ${RERANKER_ENABLED:-true}
      RERANKER_MODEL: ${RERANKER_MODEL:-cross-encoder/ms-marco-MiniLM-L-6-v2}
      # HyDE Configuration
      HYDE_ENABLED: ${HYDE_ENABLED:-true}
      HYDE_MAX_TOKENS: ${HYDE_MAX_TOKENS:-256}
      # Query Expansion Configuration
      QUERY_EXPANSION_ENABLED: ${QUERY_EXPANSION_ENABLED:-true}
      QUERY_EXPANSION_COUNT: ${QUERY_EXPANSION_COUNT:-3}
      # Budget and Quality Thresholds
      DAILY_BUDGET_USD: ${DAILY_BUDGET_USD:-10.0}
      FAITHFULNESS_THRESHOLD: ${FAITHFULNESS_THRESHOLD:-0.7}
      # Observability
      METRICS_ENABLED: ${METRICS_ENABLED:-false}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://cloud.langfuse.com}
    command: >
      python -m uvicorn islam_intelligent.api.main:app
      --host 0.0.0.0
      --port 8000
      --reload
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./apps/api:/app
      - ./scripts:/workspace/scripts
      - ./packages:/workspace/packages
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import sys,urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status == 200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - dev


  ui:
    build:
      context: ./apps/ui
      dockerfile_inline: |
        FROM node:20-alpine
        WORKDIR /app
        COPY package*.json ./
        RUN if [ -f package-lock.json ]; then npm ci; else npm install; fi
        COPY . .
    container_name: islam-intelligent-ui
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      PORT: "3000"
    command: >
      sh -c "if [ -f package-lock.json ]; then npm ci; else npm install; fi
      && npm run dev -- --hostname 0.0.0.0 --port 3000"
    ports:
      - "${UI_PORT:-3000}:3000"
    volumes:
      - ./apps/ui:/app
      - ui_node_modules:/app/node_modules
      - ui_next_cache:/app/.next
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - dev

networks:
  dev:
    name: islam-intelligent-dev
    driver: bridge

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  ui_node_modules:
  ui_next_cache:
